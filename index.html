<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kruthik</title>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:monospace;
background:black;
color:white;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:60px 60px;
overflow-x:hidden;
}

button{
background:none;
border:1px solid white;
color:white;
padding:8px 18px;
cursor:pointer;
margin:5px;
transition:0.3s;
}

button:hover{
background:white;
color:black;
}

/* ===== LANDING PAGE ===== */

.landing{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.title{
font-size:90px;
letter-spacing:5px;
}

.subtitle{
opacity:0.7;
margin-top:10px;
}

.hidden{
display:none;
}

/* ===== DASHBOARD ===== */

.dashboard{
padding:40px;
text-align:center;
}

.subtabs{
margin-bottom:20px;
}

.content{
display:none;
max-width:700px;
margin:auto;
}

/* ===== TIMER ===== */

.timerDisplay{
font-size:40px;
margin:15px;
}

/* ===== TODO ===== */

#todoInput{
padding:8px;
width:60%;
background:rgba(255,255,255,0.1);
border:1px solid white;
color:white;
}

.todoItem{
margin:5px;
}

/* ===== CHAT ===== */

.chatBox{
height:200px;
overflow-y:auto;
background:rgba(255,255,255,0.05);
padding:10px;
margin-bottom:10px;
}

#chatInput{
padding:8px;
width:70%;
background:rgba(255,255,255,0.1);
border:1px solid white;
color:white;
}

/* ===== CORNER GLOW ===== */

.cornerGlow{
position:fixed;
right:0;
bottom:0;
width:250px;
height:250px;
background:linear-gradient(45deg,blue,purple,cyan,pink);
filter:blur(90px);
animation:glow 10s infinite alternate;
}

@keyframes glow{
0%{opacity:0.4;}
100%{opacity:1;}
}

</style>
</head>

<body>

<!-- LANDING -->

<div class="landing" id="landing">
<div class="title">Kruthik</div>
<div class="subtitle">Science Student + Builder</div>
<br>
<button onclick="enterLab()">Enter Lab</button>
</div>

<!-- DASHBOARD -->

<div class="dashboard hidden" id="dashboard">

<div class="subtabs">
<button onclick="openSection('todo')">To-Do</button>
<button onclick="openSection('timer')">Timer</button>
<button onclick="openSection('chat')">AI Chat</button>
</div>

<div id="todo" class="content">
<h3>To-Do List</h3>
<input id="todoInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
<div id="todoList"></div>
</div>

<div id="timer" class="content">
<h3>Focus Timer</h3>
<div class="timerDisplay" id="timerDisplay">25:00</div>
<button onclick="setTimer(600)">10</button>
<button onclick="setTimer(900)">15</button>
<button onclick="setTimer(1500)">25</button>
<button onclick="setTimer(3000)">50</button>
<br>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<div id="chat" class="content">
<h3>AI Assistant</h3>
<div id="chatBox" class="chatBox"></div>
<input id="chatInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div class="cornerGlow"></div>

<script>

/* ===== ENTER LAB ===== */

function enterLab(){
document.getElementById("landing").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
}

/* ===== SUBTABS ===== */

function openSection(id){
let sections=document.querySelectorAll(".content");
sections.forEach(sec=>sec.style.display="none");
document.getElementById(id).style.display="block";
}

/* ===== TODO ===== */

function addTask(){
let input=document.getElementById("todoInput");
if(!input.value) return;
let div=document.createElement("div");
div.className="todoItem";
div.innerHTML=input.value+" <button onclick='this.parentElement.remove()'>Done</button>";
document.getElementById("todoList").appendChild(div);
input.value="";
}

/* ===== TIMER ===== */

let time=1500;
let interval;

function setTimer(sec){
time=sec;
updateDisplay();
}

function startTimer(){
clearInterval(interval);
interval=setInterval(()=>{
if(time>0){time--;updateDisplay();}
},1000);
}

function pauseTimer(){
clearInterval(interval);
}

function resetTimer(){
clearInterval(interval);
time=1500;
updateDisplay();
}

function updateDisplay(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timerDisplay").innerText=
(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

updateDisplay();

/* ===== GEMINI AI ===== */

const API_KEY="AIzaSyDuD6Zm6IPyVkVMRBrUsFQGsKBV2OYvimo
    ";

async function sendMessage(){
let input=document.getElementById("chatInput");
if(!input.value) return;

let box=document.getElementById("chatBox");
box.innerHTML+="<div>You: "+input.value+"</div>";

let res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:input.value}]}]
})
});

let data=await res.json();
let reply=data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

box.innerHTML+="<div>AI: "+reply+"</div>";
box.scrollTop=box.scrollHeight;
input.value="";
}

</script>
<script>
/* =========================
   ENTER LAB TRANSITION
========================= */

function enterLab() {
    document.getElementById("landing").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}


/* =========================
   SUBTAB SYSTEM
========================= */

function openSection(sectionId) {

    const sections = document.querySelectorAll(".content");

    sections.forEach(section => {
        section.style.display = "none";
    });

    const active = document.getElementById(sectionId);
    if (active) {
        active.style.display = "block";
    }
}


/* =========================
   TO-DO LIST SYSTEM
========================= */

function addTask() {

    const input = document.getElementById("todoInput");
    const taskText = input.value.trim();

    if (taskText === "") return;

    const taskDiv = document.createElement("div");
    taskDiv.className = "todoItem";

    const span = document.createElement("span");
    span.innerText = taskText;

    const doneBtn = document.createElement("button");
    doneBtn.innerText = "Done";

    doneBtn.onclick = function () {
        taskDiv.remove();
    };

    taskDiv.appendChild(span);
    taskDiv.appendChild(doneBtn);

    document.getElementById("todoList").appendChild(taskDiv);

    input.value = "";
}


/* =========================
   FOCUS TIMER SYSTEM
========================= */

let timeRemaining = 1500; // default 25 min
let timerInterval = null;

function setTimer(seconds) {
    timeRemaining = seconds;
    updateTimerDisplay();
}

function startTimer() {

    clearInterval(timerInterval);

    timerInterval = setInterval(function () {

        if (timeRemaining > 0) {
            timeRemaining--;
            updateTimerDisplay();
        } else {
            clearInterval(timerInterval);
            alert("Session Complete.");
        }

    }, 1000);
}

function pauseTimer() {
    clearInterval(timerInterval);
}

function resetTimer() {
    clearInterval(timerInterval);
    timeRemaining = 1500;
    updateTimerDisplay();
}

function updateTimerDisplay() {

    const minutes = Math.floor(timeRemaining / 60);
    const seconds = timeRemaining % 60;

    const formatted =
        (minutes < 10 ? "0" : "") + minutes +
        ":" +
        (seconds < 10 ? "0" : "") + seconds;

    document.getElementById("timerDisplay").innerText = formatted;
}

updateTimerDisplay();


/* =========================
   GEMINI AI CHAT SYSTEM
========================= */

/* IMPORTANT:
   Replace with your real Gemini API key.
   Do NOT publish real keys publicly.
*/

const GEMINI_API_KEY = "AIzaSyDuD6Zm6IPyVkVMRBrUsFQGsKBV2OYvimo";

async function sendMessage() {

    const input = document.getElementById("chatInput");
    const message = input.value.trim();

    if (message === "") return;

    const chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += "<div><b>You:</b> " + message + "</div>";
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";

    try {

        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [
                        {
                            parts: [
                                { text: message }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        const reply =
            data.candidates?.[0]?.content?.parts?.[0]?.text ||
            "No response from AI.";

        chatBox.innerHTML += "<div><b>AI:</b> " + reply + "</div>";
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {

        chatBox.innerHTML += "<div><b>AI:</b> Error connecting.</div>";
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}/* paste the full JavaScript code here */
</script>
</body>
</html>
</body>
</html>

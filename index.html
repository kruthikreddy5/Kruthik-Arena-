<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruthik Reddy</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  z-index: 10;
  transition: opacity 1.5s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* MAIN CONTENT */
#mainContent {
  opacity: 0;
  transition: opacity 2s ease;
  padding: 60px 25px;
  max-width: 900px;
  margin: auto;
}

#mainContent.visible {
  opacity: 1;
}

/* Glow effect */
h1 {
  font-size: 3rem;
  text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { text-shadow: 0 0 10px #00ff88; }
  to { text-shadow: 0 0 25px #00ff88; }
}

.nav button {
  background: none;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 8px 14px;
  margin-right: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.nav button:hover {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 15px #00ff88;
}

/* Mouse light halo */
#cursorGlow {
  position: fixed;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(0,255,136,0.2) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="cursorGlow"></div>

<div id="intro">
  <div id="bootText"></div>
</div>

<div id="mainContent">
  <h1>KRUTHIK REDDY</h1>
  <p>System online. Discipline mode active.</p>

  <div class="nav">
    <button>About</button>
    <button>Timer</button>
    <button>To-Do</button>
    <button>Notes</button>
  </div>

  <p style="margin-top:40px;">
    MPC student. Builder. Compounding skill daily.
  </p>
</div>

<script>

/* TYPEWRITER INTRO */
const text = "Booting personal system...\nLoading discipline engine...\nInitializing focus protocol...\nAccess granted.";
let i = 0;
const speed = 40;
const bootText = document.getElementById("bootText");

function typeWriter() {
  if (i < text.length) {
    bootText.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  } else {
    setTimeout(() => {
      document.getElementById("intro").classList.add("hidden");
      document.getElementById("mainContent").classList.add("visible");
      document.body.style.overflow = "auto";
    }, 1000);
  }
}
typeWriter();

/* MATRIX RAIN */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01KRUTHIKREDY$#@";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(drawMatrix, 35);

/* Mouse Glow */
document.addEventListener("mousemove", (e) => {
  const glow = document.getElementById("cursorGlow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>

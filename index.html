<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARENA | V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'JetBrains+Mono', monospace; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        #workspace {
            position: fixed; right: -350px; top: 0; width: 350px; height: 100%;
            background: rgba(10, 10, 10, 0.95); border-left: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; padding: 2rem;
            display: flex; flex-direction: column; gap: 2rem;
        }
        #workspace.open { right: 0; }
        .panel { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        #void {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-40">
        <div class="text-[10px] tracking-[0.5em] uppercase opacity-50">K-ARENA // C11</div>
        <button onclick="toggleDrawer()" class="text-[10px] border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition-all font-bold tracking-widest">[ OPERATE ]</button>
    </nav>

    <div id="workspace">
        <button onclick="toggleTheme()" class="w-full py-3 border border-white/10 text-[9px] font-bold hover:bg-white hover:text-black transition-all uppercase tracking-widest">Toggle Theme</button>

        <div class="panel">
            <h3 class="text-[9px] uppercase opacity-40 mb-4 font-bold tracking-widest">Objectives</h3>
            <input type="text" id="todo-in" onkeypress="addTodo(event)" class="w-full bg-transparent border-b border-white/10 text-[11px] pb-2 focus:outline-none focus:border-white/50" placeholder="+ Add Target">
            <ul id="todo-list" class="mt-4 space-y-2 text-[10px] opacity-70"></ul>
        </div>

        <div class="panel">
            <div class="flex gap-4 mb-4 opacity-40 text-[9px] font-bold">
                <button onclick="setTimer(25)" class="hover:text-white">25M</button>
                <button onclick="setTimer(50)" class="hover:text-white">50M</button>
            </div>
            <div class="flex justify-between items-center">
                <span id="d-time" class="text-4xl font-light tracking-tighter">25:00</span>
                <button onclick="startFocus()" class="bg-white text-black px-4 py-2 text-[10px] font-bold">FOCUS</button>
            </div>
        </div>

        <div class="panel flex-1 flex flex-col min-h-0">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[9px] uppercase opacity-40 font-bold tracking-widest">Researcher</h3>
                <button onclick="copyAI()" class="text-[9px] opacity-40 hover:opacity-100">[ COPY ]</button>
            </div>
            <div id="ai-res" class="flex-1 text-[11px] overflow-y-auto scrollbar-hide italic opacity-60 leading-relaxed mb-4">Awaiting query...</div>
            <div class="flex gap-2">
                <input type="text" id="ai-in" class="flex-1 bg-white/5 border border-white/10 rounded px-3 py-3 text-[10px] focus:outline-none" placeholder="[ QUERY ]">
                <button onclick="askAI()" class="bg-white/10 px-4 rounded hover:bg-white/20">></button>
            </div>
        </div>
    </div>

    <div id="void">
        <div id="p-time" class="text-[12rem] font-thin tracking-tighter opacity-80">25:00</div>
        <button onclick="stopFocus()" class="mt-8 text-[10px] opacity-30 hover:opacity-100 tracking-[0.5em] uppercase">Terminate Session</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

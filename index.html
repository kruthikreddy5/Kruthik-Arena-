<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRUTHIK | THE ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'JetBrains+Mono', monospace; overflow-x: hidden; }
        
        /* Binary Background */
        #binary-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        /* The Drawer */
        #workspace {
            position: fixed; right: -400px; top: 0; width: 400px; height: 100%;
            background: rgba(5, 5, 5, 0.98); border-left: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; padding: 2.5rem;
            display: flex; flex-direction: column; gap: 1.5rem; box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }
        #workspace.open { right: 0; }

        /* Lamp Effect */
        .lamp-oil { width: 40px; height: 40px; margin: 0 auto; filter: drop-shadow(0 0 15px #fff); opacity: 0.8; }
        
        /* Focus Portal */
        #portal {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .panel { background: rgba(255,255,255,0.03); padding: 1.2rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="binary-canvas"></canvas>

    <nav class="fixed top-0 left-0 w-full p-10 flex justify-between items-center z-50">
        <div>
            <h1 class="text-xs tracking-[0.8em] font-bold opacity-40">KRUTHIK // ARENA</h1>
            <p class="text-[9px] mt-2 opacity-20">CLASS 11 RESEARCH STATION</p>
        </div>
        <button onclick="toggleDrawer()" class="text-[10px] border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition-all font-bold tracking-[0.3em] uppercase">
            [ OPERATE ]
        </button>
    </nav>

    <div id="workspace">
        <div class="lamp-oil mb-4">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41M12 7a5 5 0 100 10 5 5 0 000-10z" />
            </svg>
        </div>

        <button onclick="document.body.classList.toggle('paper-mode')" class="w-full py-2 border border-white/10 text-[8px] uppercase tracking-widest opacity-50 hover:opacity-100">Toggle Theme</button>

        <div class="panel">
            <h3 class="text-[9px] uppercase opacity-30 mb-4 font-bold tracking-widest">Grind Tracker</h3>
            <input type="text" id="todo-in" onkeypress="if(event.key==='Enter')addTodo()" class="w-full bg-transparent border-b border-white/10 text-[10px] pb-2 focus:outline-none" placeholder="+ New Target">
            <ul id="todo-list" class="mt-4 space-y-3 text-[10px] opacity-60 overflow-y-auto max-h-32 scrollbar-hide"></ul>
        </div>

        <div class="panel">
            <div class="flex gap-6 mb-4 opacity-30 text-[9px] font-bold">
                <button onclick="setTimer(25)">25M</button>
                <button onclick="setTimer(50)">50M</button>
                <button onclick="setTimer(10)">10M</button>
            </div>
            <div class="flex justify-between items-end">
                <span id="d-time" class="text-5xl font-light tracking-tighter">25:00</span>
                <button onclick="startFocus()" class="bg-white text-black px-5 py-2 text-[9px] font-bold uppercase tracking-widest">Focus</button>
            </div>
        </div>

        <div class="panel flex-1 flex flex-col min-h-0">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[9px] uppercase opacity-30 font-bold">AI Co-Pilot</h3>
                <button onclick="copyAI()" class="text-[8px] opacity-30 hover:opacity-100">[ COPY ]</button>
            </div>
            <div id="ai-res" class="flex-1 text-[10px] overflow-y-auto scrollbar-hide italic opacity-50 leading-relaxed mb-4 pr-2">Awaiting query...</div>
            <div class="flex gap-2">
                <input type="text" id="ai-in" class="flex-1 bg-white/5 border border-white/10 rounded px-4 py-3 text-[10px] focus:outline-none" placeholder="QUERY UNIT...">
                <button onclick="askAI()" class="bg-white/10 px-4 rounded hover:bg-white/20">></button>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="p-time" class="text-[15rem] font-thin tracking-tighter opacity-70">25:00</div>
        <button onclick="stopFocus()" class="mt-10 text-[10px] opacity-20 hover:opacity-100 tracking-[1em] uppercase">Abort Session</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

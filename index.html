<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruthik Reddy</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  color: #eaeaea;
  overflow-x: hidden;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #111111, #1f1f1f);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

main {
  max-width: 800px;
  margin: auto;
  padding: 60px 25px;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 2.5rem;
  letter-spacing: 2px;
}

.subtitle {
  opacity: 0.6;
  margin-bottom: 30px;
}

/* ===== NAV ===== */
.nav button {
  background: none;
  border: 1px solid #444;
  color: #eaeaea;
  padding: 8px 14px;
  margin-right: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.nav button:hover {
  background: #222;
  box-shadow: 0 0 10px #888;
}

/* ===== TABS ===== */
.tab {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}

.tab.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* ===== BOXES ===== */
.timer-box, .todo-box, .notes-box {
  margin-top: 20px;
  padding: 20px;
  border: 1px solid #444;
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(8px);
  transition: transform 0.3s ease;
}

.timer-box:hover,
.todo-box:hover,
.notes-box:hover {
  transform: scale(1.02);
}

input, textarea {
  background: none;
  border: 1px solid #555;
  color: #eaeaea;
  padding: 8px;
  font-family: inherit;
  width: 100%;
  margin-top: 10px;
}

button.action {
  margin-top: 10px;
  background: none;
  border: 1px solid #555;
  color: #eaeaea;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button.action:hover {
  background: #222;
  box-shadow: 0 0 8px #aaa;
}

/* ===== TIMER ===== */
#timeDisplay {
  font-size: 2rem;
  margin-bottom: 15px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #222;
  margin-top: 15px;
  overflow: hidden;
}

.progress {
  height: 8px;
  background: #888;
  width: 0%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* ===== PARTICLES ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<main>

<h1>kruthik reddy</h1>
<p class="subtitle">building systems. evolving daily.</p>

<div class="nav">
  <button onclick="openTab('about')">about</button>
  <button onclick="openTab('timer')">timer</button>
  <button onclick="openTab('todo')">to-do</button>
  <button onclick="openTab('notes')">notes</button>
</div>

<div id="about" class="tab active">
  <h2>About Me</h2>
  <p>
    MPC student focused on mathematics, physics, and programming.
    Long-term objective: build rare skill and high-value systems.
  </p>
</div>

<div id="timer" class="tab">
  <h2>Focus Timer</h2>
  <div class="timer-box">
    <div id="timeDisplay">00:00</div>
    <input type="number" id="minutesInput" placeholder="Enter minutes">
    <button class="action" onclick="startTimer()">Start</button>
    <button class="action" onclick="pauseTimer()">Pause</button>
    <button class="action" onclick="resetTimer()">Reset</button>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>
  </div>
</div>

<div id="todo" class="tab">
  <h2>To-Do</h2>
  <div class="todo-box">
    <input type="text" id="taskInput" placeholder="New task">
    <button class="action" onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>
</div>

<div id="notes" class="tab">
  <h2>Notes</h2>
  <div class="notes-box">
    <textarea id="notesArea" rows="8"></textarea>
  </div>
</div>

</main>

<script>

/* TAB SYSTEM */
function openTab(tabId){
  document.querySelectorAll(".tab").forEach(tab=>{
    tab.classList.remove("active");
  });
  document.getElementById(tabId).classList.add("active");
}

/* TIMER */
let duration=0, remaining=0, interval=null;

function updateDisplay(){
  let m=Math.floor(remaining/60);
  let s=remaining%60;
  document.getElementById("timeDisplay").textContent=
  `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
  let percent=duration?((duration-remaining)/duration)*100:0;
  document.getElementById("progress").style.width=percent+"%";
}

function startTimer(){
  if(interval) return;
  const input=document.getElementById("minutesInput").value;
  if(!duration){
    if(!input||input<=0) return;
    duration=input*60;
    remaining=duration;
  }
  interval=setInterval(()=>{
    remaining--;
    updateDisplay();
    if(remaining<=0){
      clearInterval(interval);
      interval=null;
      duration=0;
    }
  },1000);
}

function pauseTimer(){ clearInterval(interval); interval=null; }
function resetTimer(){ clearInterval(interval); interval=null; duration=0; remaining=0; updateDisplay(); }
updateDisplay();

/* TODO */
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
function renderTasks(){
  const list=document.getElementById("taskList");
  list.innerHTML="";
  tasks.forEach((task,i)=>{
    const li=document.createElement("li");
    li.textContent=task;
    li.onclick=()=>{
      tasks.splice(i,1);
      localStorage.setItem("tasks",JSON.stringify(tasks));
      renderTasks();
    };
    list.appendChild(li);
  });
}
function addTask(){
  const input=document.getElementById("taskInput");
  if(!input.value) return;
  tasks.push(input.value);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  input.value="";
  renderTasks();
}
renderTasks();

/* NOTES */
const notes=document.getElementById("notesArea");
notes.value=localStorage.getItem("notes")||"";
notes.addEventListener("input",()=>{
  localStorage.setItem("notes",notes.value);
});

/* PARTICLE BACKGROUND */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#ffffff22";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
